<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Brain</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: #07070f;
      color: #f1f5f9;
      width: 340px;
      min-height: 420px;
      -webkit-font-smoothing: antialiased;
    }

    .header {
      background: linear-gradient(135deg, #0d0d1a, #12122a);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo {
      width: 32px; height: 32px;
      border-radius: 8px;
      background: linear-gradient(135deg, #7c3aed, #3b82f6);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }

    .title { font-size: 14px; font-weight: 700; }
    .subtitle { font-size: 10px; color: #64748b; margin-top: 1px; }

    .body { padding: 14px 16px; }

    /* Preview */
    .preview {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 10px 12px;
      margin-bottom: 12px;
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }
    .preview-thumb { width: 48px; height: 48px; border-radius: 6px; object-fit: cover; flex-shrink: 0; }
    .preview-thumb-ph { width: 48px; height: 48px; border-radius: 6px; background: linear-gradient(135deg, #2e1065, #1e1b4b); display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
    .preview-title { font-size: 12px; font-weight: 600; line-height: 1.4; margin-bottom: 3px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .preview-url   { font-size: 10px; color: #64748b; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* Type badge */
    .badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 8px; border-radius: 999px;
      font-size: 10px; font-weight: 600; letter-spacing: 0.3px; text-transform: uppercase;
      margin-bottom: 10px;
    }
    .badge-article { background: rgba(59,130,246,0.14); color: #3b82f6; }
    .badge-youtube { background: rgba(239,68,68,0.14);  color: #ef4444; }
    .badge-tweet   { background: rgba(6,182,212,0.14);  color: #06b6d4; }
    .badge-image   { background: rgba(16,185,129,0.14); color: #10b981; }
    .badge-pdf     { background: rgba(249,115,22,0.14); color: #f97316; }
    .badge-link    { background: rgba(100,116,139,0.14);color: #64748b; }

    /* Inputs */
    .label { display: block; font-size: 10px; font-weight: 600; color: #94a3b8; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.3px; }
    .input {
      width: 100%; background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px; color: #f1f5f9;
      font-family: inherit; font-size: 12px; padding: 8px 10px;
      outline: none; transition: border-color 0.15s; margin-bottom: 10px;
    }
    .input:focus { border-color: #7c3aed; }
    .input::placeholder { color: #475569; }

    /* Tags */
    .tags { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 10px; }
    .tag {
      display: inline-flex; align-items: center; gap: 3px;
      padding: 2px 8px; border-radius: 999px;
      background: rgba(124,58,237,0.12); border: 1px solid rgba(124,58,237,0.2);
      font-size: 10px; color: #a78bfa; cursor: pointer;
    }

    /* Buttons */
    .btn-save {
      width: 100%; padding: 11px;
      background: linear-gradient(135deg, #7c3aed, #3b82f6);
      color: white; border: none; border-radius: 8px;
      font-family: inherit; font-size: 13px; font-weight: 600;
      cursor: pointer; transition: all 0.15s; margin-top: 4px;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .btn-save:hover { transform: translateY(-1px); box-shadow: 0 0 20px rgba(124,58,237,0.4); }
    .btn-save:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    /* Status messages */
    .status { text-align: center; padding: 12px; font-size: 12px; border-radius: 8px; margin-top: 8px; }
    .status.success { background: rgba(16,185,129,0.12); color: #10b981; border: 1px solid rgba(16,185,129,0.2); }
    .status.error   { background: rgba(239,68,68,0.12);  color: #ef4444; border: 1px solid rgba(239,68,68,0.2); }

    /* Spinner */
    .spinner { width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* API URL note */
    .api-note { font-size: 10px; color: #475569; text-align: center; margin-top: 10px; }
    .api-note a { color: #7c3aed; text-decoration: none; }

    .form-group { margin-bottom: 2px; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">🧠</div>
    <div>
      <div class="title">Smart Brain</div>
      <div class="subtitle">Save to your knowledge graph</div>
    </div>
  </div>

  <div class="body">
    <!-- Preview -->
    <div class="preview" id="preview-box">
      <div class="preview-thumb-ph" id="preview-thumb">🔗</div>
      <div style="flex:1; overflow:hidden;">
        <div class="preview-title" id="preview-title">Loading page info…</div>
        <div class="preview-url"  id="preview-url"></div>
      </div>
    </div>

    <!-- Type badge -->
    <div id="type-badge" class="badge badge-link">link</div>

    <!-- Note / tag input -->
    <div class="form-group">
      <label class="label">Your note (optional)</label>
      <textarea id="note-input" class="input" rows="2" placeholder="Why are you saving this?"></textarea>
    </div>

    <!-- Auto tags -->
    <div class="form-group">
      <label class="label">Auto tags</label>
      <div class="tags" id="tags-box">
        <span style="font-size:11px;color:#475569;">Detecting…</span>
      </div>
    </div>

    <!-- Save button -->
    <button id="save-btn" class="btn-save">🧠 Save to Brain</button>

    <!-- Status -->
    <div id="status-msg" class="status" style="display:none;"></div>

    <div class="api-note">
      API: <span id="api-url-display">http://localhost:5000</span>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
